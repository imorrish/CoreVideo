name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "wiki/**"
      - "site-assets/**"
      - "scripts/build-site.mjs"
      - "public/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy corevideo.iamfatness.us
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build static site
        run: node scripts/build-site.mjs

      - name: Validate Cloudflare configuration
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing required secret: CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing required secret: CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@latest deploy
